
{% extends "base.html" %}

{% block content %}

<style>

/* =========================
   TITLE
========================= */
.title {
    font-size: 26px;
    font-weight: bold;
    margin-bottom: 15px;
}

/* ADD BUTTON */
.btn-add {
    background: #1abc9c;
    color: white;
    padding: 10px 15px;
    border-radius: 8px;
    text-decoration: none;
    display: inline-block;
    margin-bottom: 15px;
}

.btn-add:hover {
    background: #16a085;
}

/* TABLE */
.table-box {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #2c3e50;
    color: white;
    padding: 12px;
    text-align: left;
}

td {
    padding: 12px;
    border-bottom: 1px solid #eee;
}

/* BUTTONS */
.btn {
    padding: 6px 10px;
    border-radius: 6px;
    text-decoration: none;
    color: white;
    font-size: 12px;
    margin-right: 5px;
}

.btn-edit {
    background: #f39c12;
}

.btn-edit:hover {
    opacity: 0.8;
}

.btn-delete {
    background: #e74c3c;
}

.btn-delete:hover {
    opacity: 0.8;
}

/* EMPTY */
.empty {
    text-align: center;
    color: gray;
    padding: 15px;
}

</style>

<!-- =========================
     TITLE
========================= -->
<div class="title">📂 Catégories</div>

<!-- ADD BUTTON -->
<a href="{% url 'add_category' %}" class="btn-add">
    ➕ Ajouter catégorie
</a>

<!-- TABLE -->
<div class="table-box">

<table>

<tr>
    <th>#</th>
    <th>Nom</th>
    <th>Actions</th>
</tr>

{% for categorie in categories %}

<tr>
    <td>{{ forloop.counter }}</td>
    <td>{{ categorie.nom }}</td>

    <td>

        <a href="{% url 'edit_category' categorie.id %}" class="btn btn-edit">
            ✏ Modifier
        </a>

        <a href="{% url 'delete_category' categorie.id %}" class="btn btn-delete"
           onclick="return confirm('Voulez-vous supprimer cette catégorie ?')">
            🗑 Supprimer
        </a>

    </td>
</tr>

{% empty %}

<tr>
    <td colspan="3" class="empty">
        Aucune catégorie trouvée.
    </td>
</tr>

{% endfor %}

</table>

</div>

{% endblock %}
