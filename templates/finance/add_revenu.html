{% extends "base.html" %}

{% block content %}

<style>

/* =========================
   FORM PRO
========================= */
.form-box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    max-width: 600px;
}

/* TITRE */
.form-title {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 20px;
    color: #2c3e50;
}

/* LABEL */
label {
    font-weight: bold;
    display: block;
    margin-bottom: 5px;
}

/* INPUTS */
input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
    transition: 0.3s;
}

input:focus, select:focus, textarea:focus {
    border-color: #1abc9c;
    box-shadow: 0 0 5px rgba(26,188,156,0.3);
}

/* BUTTONS */
.btn {
    padding: 10px 15px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    border: none;
    cursor: pointer;
    display: inline-block;
}

.btn-success {
    background: #1abc9c;
    color: white;
}

.btn-success:hover {
    background: #16a085;
}

.btn-secondary {
    background: #95a5a6;
    color: white;
}

.btn-secondary:hover {
    background: #7f8c8d;
}

</style>

<div class="form-box">

    <div class="form-title">💰 Ajouter un revenu</div>

    <form method="POST">

        {% csrf_token %}

        <!-- =========================
             SOURCE
        ========================= -->
        <label>🏦 Source du revenu</label>

        <input type="text"
               name="source"
               placeholder="Ex : Salaire, Business..."
               required>

        <!-- =========================
             CATEGORIE
        ========================= -->
        <label>📂 Catégorie</label>

        <select name="categorie">

            <option value="">-- Choisir --</option>

            {% for c in categories %}
                <option value="{{ c.id }}">
                    {{ c.nom }}
                </option>
            {% endfor %}

        </select>

        <!-- =========================
             MONTANT
        ========================= -->
        <label>💰 Montant</label>

        <input type="number"
               name="montant"
               step="0.01"
               placeholder="Ex : 500000"
               required>

        <!-- =========================
             DESCRIPTION
        ========================= -->
        <label>📝 Description</label>

        <textarea name="description"
                  placeholder="Détails du revenu..."></textarea>

        <!-- =========================
             BUTTONS
        ========================= -->
        <button type="submit" class="btn btn-success">
            💾 Enregistrer
        </button>

        <a href="{% url 'revenu_list' %}" class="btn btn-secondary">
            Annuler
        </a>

    </form>

</div>

{% endblock %}
