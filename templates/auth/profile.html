{% extends "base.html" %}

{% block content %}

<style>

.profile-card{
    width:700px;
    margin:auto;
    background:white;
    border-radius:15px;
    padding:30px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.profile-header{
    text-align:center;
}

.profile-header img{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #1abc9c;
}

.profile-header h2{
    margin-top:15px;
    color:#2c3e50;
}

table{
    width:100%;
    margin-top:25px;
}

td{
    padding:12px;
    border-bottom:1px solid #eee;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:12px 20px;
    background:#1abc9c;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}

.btn:hover{
    background:#16a085;
}

</style>

<div class="profile-card">

<div class="profile-header">

<img src="{{ user.photo.url }}">

<h2>{{ user.nom }}</h2>

</div>

<table>

<tr>
<td><strong>Nom</strong></td>
<td>{{ user.nom }}</td>
</tr>

<tr>
<td><strong>Email</strong></td>
<td>{{ user.email }}</td>
</tr>

<tr>
<td><strong>Rôle</strong></td>
<td>{{ user.role }}</td>
</tr>

<tr>
<td><strong>Statut</strong></td>
<td>{{ user.statut }}</td>
</tr>

</table>

<a href="{% url 'edit_profile' %}" class="btn">
✏ Modifier mon profil
</a>
<br><br>

<a href="{% url 'change_password' %}" class="btn">
🔒 Changer le mot de passe
</a>
</div>


{% endblock %}
