<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Créer un compte</title>

    <style>
        body{
            font-family: Arial;
            background:#2c3e50;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            width:380px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,.3);
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:#27ae60;
            color:white;
            border:none;
            cursor:pointer;
            font-size:16px;
        }

        .error{
            color:red;
            margin-bottom:10px;
        }

        a{
            text-decoration:none;
            display:block;
            text-align:center;
            margin-top:10px;
        }
    </style>
</head>
<body>

<div class="box">

<h2>Créer un compte</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Nom utilisateur" required>

    <input type="email" name="email" placeholder="Email" required>

    <input type="password" name="password1" placeholder="Mot de passe" required>

    <input type="password" name="password2" placeholder="Confirmer mot de passe" required>

    <!-- 🔥 BOUTON IMPORTANT -->
    <button type="submit">
        Créer le compte
    </button>
</form>

<a href="/auth/login/">Déjà un compte ? Se connecter</a>

</div>

</body>
</html>
