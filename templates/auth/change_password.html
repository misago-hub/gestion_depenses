{% extends "base.html" %}

{% block content %}

<style>

.form-box{
    width:600px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.title{
    font-size:26px;
    font-weight:bold;
    margin-bottom:20px;
    color:#2c3e50;
}

label{
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:20px;
    border:1px solid #ddd;
    border-radius:8px;
}

.btn-save{
    background:#1abc9c;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}

.btn-save:hover{
    background:#16a085;
}

.msg{
    padding:12px;
    border-radius:8px;
    margin-bottom:20px;
    background:#ecf0f1;
}

</style>

<div class="form-box">

<div class="title">

🔒 Changer le mot de passe

</div>

{% if messages %}
    {% for message in messages %}
        <div class="msg">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<form method="POST">

{% csrf_token %}

<label>Ancien mot de passe</label>

<input
type="password"
name="ancien"
required>

<label>Nouveau mot de passe</label>

<input
type="password"
name="nouveau"
required>

<label>Confirmer le nouveau mot de passe</label>

<input
type="password"
name="confirmer"
required>

<button class="btn-save">

💾 Enregistrer

</button>

</form>

</div>

{% endblock %}
