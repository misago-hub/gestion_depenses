{% extends "base.html" %}

{% block content %}

<style>

.form-box{
    width:650px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.title{
    font-size:28px;
    margin-bottom:20px;
    color:#2c3e50;
}

label{
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:20px;
    border-radius:8px;
    border:1px solid #ddd;
}

input[type=file]{
    border:none;
}

.btn-save{
    background:#1abc9c;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.btn-save:hover{
    background:#16a085;
}

.btn-cancel{
    background:#7f8c8d;
    color:white;
    text-decoration:none;
    padding:12px 20px;
    border-radius:8px;
    margin-left:10px;
}

</style>

<div class="form-box">

<div class="title">

👤 Modifier mon profil

</div>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<label>Nom</label>

<input
type="text"
name="nom"
value="{{ user.nom }}"
required>

<label>Email</label>

<input
type="email"
name="email"
value="{{ user.email }}"
required>

<label>Photo de profil</label>

<input
type="file"
name="photo">

<button class="btn-save">

💾 Enregistrer

</button>

<a href="{% url 'profile' %}" class="btn-cancel">

Annuler

</a>

</form>

</div>

{% endblock %}
